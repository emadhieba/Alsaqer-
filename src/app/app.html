<div class="min-h-screen flex flex-col bg-dark text-white">
  <app-navbar></app-navbar>
  <main class="flex-1 pt-20">
    <router-outlet></router-outlet>
  </main>
  <app-footer></app-footer>
  <app-whatsapp-button></app-whatsapp-button>

  <!-- Back to Top -->
  <button *ngIf="showBackToTop" (click)="scrollToTop()"
    class="fixed bottom-6 right-6 z-50 w-12 h-12 rounded-full bg-gradient-to-l from-gold to-gold-light text-dark shadow-lg shadow-gold/20 hover:shadow-gold/40 hover:-translate-y-1 transition-all duration-300 flex items-center justify-center"
    aria-label="العودة للأعلى">
    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 15l7-7 7 7"/>
    </svg>
  </button>
</div>
