<header
  class="fixed top-0 inset-x-0 z-40 bg-dark-card/80 backdrop-blur-md border-b border-gold/40 shadow-[0_4px_30px_rgba(0,0,0,0.5)]"
>
  <nav class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex items-center justify-between h-20">
      <!-- Right: Logo and name (RTL) -->
      <div class="flex items-center flex-row-reverse gap-3">
        <img
          src="assets/images/logo-transparent.png"
          alt="نادي الصقر الإفريقي للسيارات"
          class="h-12 w-auto object-contain" loading="eager"
          onerror="this.style.display='none'; this.nextElementSibling.style.display='flex'"
        />
        <span class="text-gold font-bold text-lg hidden"></span>
        <div class="hidden sm:block text-right">
          <div class="text-gold font-extrabold text-base leading-tight">
            نادي الصقر الإفريقي للسيارات
          </div>
          <div class="text-[10px] text-gray-400 tracking-wide">
            The African Falcon Automobile Club
          </div>
        </div>
      </div>

      <!-- Center: Nav links -->
      <div class="hidden md:flex flex-1 justify-center">
        <ul class="flex gap-6 text-sm font-semibold text-gray-200">
          <li>
            <a
              routerLink="/"
              routerLinkActive="text-gold"
              [routerLinkActiveOptions]="{ exact: true }"
              class="relative px-1 py-1 transition-colors hover:text-gold"
            >الرئيسية
              <span routerLinkActive="!opacity-100" class="absolute -bottom-[2px] inset-x-0 h-[2px] bg-gold rounded-full opacity-0 transition-opacity"></span>
            </a>
          </li>
          <li>
            <a
              routerLink="/services"
              routerLinkActive="text-gold"
              class="relative px-1 py-1 transition-colors hover:text-gold"
            >خدماتنا
              <span routerLinkActive="!opacity-100" class="absolute -bottom-[2px] inset-x-0 h-[2px] bg-gold rounded-full opacity-0 transition-opacity"></span>
            </a>
          </li>
          <li>
            <a
              routerLink="/about"
              routerLinkActive="text-gold"
              class="relative px-1 py-1 transition-colors hover:text-gold"
            >عن النادي
              <span routerLinkActive="!opacity-100" class="absolute -bottom-[2px] inset-x-0 h-[2px] bg-gold rounded-full opacity-0 transition-opacity"></span>
            </a>
          </li>
          <li>
            <a
              routerLink="/contact"
              routerLinkActive="text-gold"
              class="relative px-1 py-1 transition-colors hover:text-gold"
            >تواصل معنا
              <span routerLinkActive="!opacity-100" class="absolute -bottom-[2px] inset-x-0 h-[2px] bg-gold rounded-full opacity-0 transition-opacity"></span>
            </a>
          </li>
        </ul>
      </div>

      <!-- Left: CTA + Mobile menu -->
      <div class="flex items-center gap-3">
        <a
          href="https://wa.me/201069822661"
          target="_blank"
          rel="noopener"
          class="hidden sm:inline-flex items-center justify-center px-4 py-2 rounded-full bg-gradient-to-l from-gold to-gold-light text-dark font-bold text-xs shadow-md shadow-gold/20 hover:shadow-gold/30 hover:-translate-y-0.5 transition-all duration-200"
        >
          اطلب الآن
        </a>

        <!-- Mobile hamburger -->
        <button
          type="button"
          class="md:hidden inline-flex items-center justify-center w-10 h-10 rounded-xl text-gray-200 hover:text-gold hover:bg-dark-border/60 focus:outline-none focus:ring-2 focus:ring-gold/50 transition-all"
          (click)="toggleMenu()"
          aria-label="القائمة"
        >
          <svg *ngIf="!isMenuOpen" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
          </svg>
          <svg *ngIf="isMenuOpen" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- Mobile Drawer Overlay -->
    <div *ngIf="isMenuOpen" class="fixed inset-0 z-50 md:hidden">
      <!-- Backdrop -->
      <div class="absolute inset-0 bg-black/60 backdrop-blur-sm" (click)="toggleMenu()"></div>
      <!-- Drawer panel -->
      <div class="absolute top-0 left-0 bottom-0 w-72 max-w-[85vw] bg-dark-card border-l border-gold/20 shadow-2xl overflow-y-auto" style="animation: drawerSlideIn 0.3s ease-out;">
        <div class="flex items-center justify-between p-5 border-b border-gold/10">
          <div class="flex items-center gap-3">
            <img src="assets/images/logo-transparent.png" alt="شعار" class="h-10 w-auto" loading="eager" />
            <span class="text-gold font-bold text-sm">القائمة</span>
          </div>
          <button type="button" (click)="toggleMenu()" class="w-9 h-9 rounded-full bg-dark-border/60 flex items-center justify-center text-gray-200 hover:text-gold transition-colors">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
            </svg>
          </button>
        </div>
        <ul class="py-3 text-sm font-semibold text-gray-200">
          <li>
            <a routerLink="/" [routerLinkActiveOptions]="{ exact: true }" routerLinkActive="text-gold bg-gold/5"
              class="flex items-center gap-4 px-5 py-3.5 hover:bg-dark-border/40 hover:text-gold border-b border-dark-border/30 transition-colors"
              (click)="toggleMenu()">
              <span class="w-2 h-2 rounded-full bg-gold/40"></span>
              الرئيسية
            </a>
          </li>
          <li>
            <a routerLink="/services" routerLinkActive="text-gold bg-gold/5"
              class="flex items-center gap-4 px-5 py-3.5 hover:bg-dark-border/40 hover:text-gold border-b border-dark-border/30 transition-colors"
              (click)="toggleMenu()">
              <span class="w-2 h-2 rounded-full bg-gold/40"></span>
              خدماتنا
            </a>
          </li>
          <li>
            <a routerLink="/about" routerLinkActive="text-gold bg-gold/5"
              class="flex items-center gap-4 px-5 py-3.5 hover:bg-dark-border/40 hover:text-gold border-b border-dark-border/30 transition-colors"
              (click)="toggleMenu()">
              <span class="w-2 h-2 rounded-full bg-gold/40"></span>
              عن النادي
            </a>
          </li>
          <li>
            <a routerLink="/contact" routerLinkActive="text-gold bg-gold/5"
              class="flex items-center gap-4 px-5 py-3.5 hover:bg-dark-border/40 hover:text-gold border-b border-dark-border/30 transition-colors"
              (click)="toggleMenu()">
              <span class="w-2 h-2 rounded-full bg-gold/40"></span>
              تواصل معنا
            </a>
          </li>
        </ul>
        <div class="px-5 pt-4 pb-6 border-t border-gold/10 mt-2">
          <a href="https://wa.me/201069822661" target="_blank" rel="noopener"
            class="flex items-center justify-center gap-2 w-full px-5 py-3 rounded-full bg-gradient-to-l from-gold to-gold-light text-dark font-bold text-sm shadow-md hover:shadow-lg transition-all"
            (click)="toggleMenu()">
            <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 32 32">
              <path d="M16.004 3.001c-6.06 0-10.995 4.935-10.995 10.996 0 1.936.507 3.82 1.47 5.486L4 28l8.7-2.403a11.02 11.02 0 0 0 3.304.5h.001c6.06 0 10.995-4.935 10.995-10.996 0-2.94-1.146-5.702-3.227-7.781A10.93 10.93 0 0 0 16.004 3z"/>
            </svg>
            اطلب الآن عبر واتساب
          </a>
        </div>
      </div>
    </div>
  </nav>
</header>
