<header
  class="fixed top-0 inset-x-0 z-40 bg-dark-card border-b-2 border-gold shadow-lg"
>
  <nav class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex items-center justify-between h-20">
      <!-- Right: Logo and name (RTL) -->
      <div class="flex items-center flex-row-reverse gap-3">
        <img
          src="assets/images/logo-transparent.png"
          alt="نادي الصقر الإفريقي للسيارات"
          class="h-14 w-auto object-contain"
          onerror="this.style.display='none'; this.nextElementSibling.style.display='flex'"
        />
        <span class="text-gold font-bold text-lg hidden"></span>
        <div class="hidden sm:block text-right">
          <div class="text-gold font-extrabold text-lg">
            نادي الصقر الإفريقي للسيارات
          </div>
          <div class="text-xs text-gray-300">
            The African Falcon Automobile Club
          </div>
        </div>
      </div>

      <!-- Center: Nav links -->
      <div class="hidden md:flex flex-1 justify-center">
        <ul class="flex gap-8 text-sm font-semibold text-gray-200">
          <li>
            <a
              routerLink="/"
              routerLinkActive="text-gold border-b-2 border-gold"
              [routerLinkActiveOptions]="{ exact: true }"
              class="pb-1 transition-colors hover:text-gold"
              >الرئيسية</a
            >
          </li>
          <li>
            <a
              routerLink="/services"
              routerLinkActive="text-gold border-b-2 border-gold"
              class="pb-1 transition-colors hover:text-gold"
              >خدماتنا</a
            >
          </li>
          <li>
            <a
              routerLink="/about"
              routerLinkActive="text-gold border-b-2 border-gold"
              class="pb-1 transition-colors hover:text-gold"
              >عن النادي</a
            >
          </li>
          <li>
            <a
              routerLink="/contact"
              routerLinkActive="text-gold border-b-2 border-gold"
              class="pb-1 transition-colors hover:text-gold"
              >تواصل معنا</a
            >
          </li>
        </ul>
      </div>

      <!-- Left: CTA + Mobile menu -->
      <div class="flex items-center gap-4">
        <a
          href="https://wa.me/201069822661"
          target="_blank"
          rel="noopener"
          class="hidden sm:inline-flex items-center justify-center px-4 py-2 rounded-full bg-gold text-dark font-bold text-sm shadow-md hover:bg-gold-light hover:-translate-y-0.5 transition-all"
        >
          اطلب الآن
        </a>

        <!-- Mobile hamburger -->
        <button
          type="button"
          class="md:hidden inline-flex items-center justify-center p-2 rounded-md text-gray-200 hover:text-gold hover:bg-dark-border focus:outline-none focus:ring-2 focus:ring-gold"
          (click)="toggleMenu()"
          aria-label="القائمة"
        >
          <span *ngIf="!isMenuOpen">&#9776;</span>
          <span *ngIf="isMenuOpen">&times;</span>
        </button>
      </div>
    </div>

    <!-- Mobile menu -->
    <div
      *ngIf="isMenuOpen"
      class="md:hidden border-t border-gold/40 bg-dark-card/95 backdrop-blur-sm rounded-b-lg"
    >
      <ul class="flex flex-col py-3 text-sm font-semibold text-gray-200">
        <li>
          <a
            routerLink="/"
            [routerLinkActiveOptions]="{ exact: true }"
            routerLinkActive="text-gold"
            class="block px-4 py-2 hover:bg-dark-border/60 hover:text-gold border-b border-dark-border"
            (click)="toggleMenu()"
            >الرئيسية</a
          >
        </li>
        <li>
          <a
            routerLink="/services"
            routerLinkActive="text-gold"
            class="block px-4 py-2 hover:bg-dark-border/60 hover:text-gold border-b border-dark-border"
            (click)="toggleMenu()"
            >خدماتنا</a
          >
        </li>
        <li>
          <a
            routerLink="/about"
            routerLinkActive="text-gold"
            class="block px-4 py-2 hover:bg-dark-border/60 hover:text-gold border-b border-dark-border"
            (click)="toggleMenu()"
            >عن النادي</a
          >
        </li>
        <li>
          <a
            routerLink="/contact"
            routerLinkActive="text-gold"
            class="block px-4 py-2 hover:bg-dark-border/60 hover:text-gold"
            (click)="toggleMenu()"
            >تواصل معنا</a
          >
        </li>
        <li class="px-4 pt-2">
          <a
            href="https://wa.me/201069822661"
            target="_blank"
            rel="noopener"
            class="block w-full text-center px-4 py-2 rounded-full bg-gold text-dark font-bold text-sm shadow-md hover:bg-gold-light transition-colors border border-gold"
            (click)="toggleMenu()"
          >
            اطلب الآن عبر واتساب
          </a>
        </li>
      </ul>
    </div>
  </nav>
</header>
