<header
  class="fixed top-0 inset-x-0 z-40 bg-dark-card/80 backdrop-blur-md border-b border-gold/40 shadow-[0_4px_30px_rgba(0,0,0,0.5)]"
>
  <nav class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex items-center justify-between h-20">
      <!-- Right: Logo and name (RTL) -->
      <div class="flex items-center flex-row-reverse gap-3">
        <img
          src="assets/images/logo-transparent.png"
          alt="نادي الصقر الإفريقي للسيارات"
          class="h-12 w-auto object-contain"
          onerror="this.style.display='none'; this.nextElementSibling.style.display='flex'"
        />
        <span class="text-gold font-bold text-lg hidden"></span>
        <div class="hidden sm:block text-right">
          <div class="text-gold font-extrabold text-base leading-tight">
            نادي الصقر الإفريقي للسيارات
          </div>
          <div class="text-[10px] text-gray-400 tracking-wide">
            The African Falcon Automobile Club
          </div>
        </div>
      </div>

      <!-- Center: Nav links -->
      <div class="hidden md:flex flex-1 justify-center">
        <ul class="flex gap-6 text-sm font-semibold text-gray-200">
          <li>
            <a
              routerLink="/"
              routerLinkActive="text-gold"
              [routerLinkActiveOptions]="{ exact: true }"
              class="relative px-1 py-1 transition-colors hover:text-gold"
            >الرئيسية
              <span routerLinkActive="!opacity-100" class="absolute -bottom-[2px] inset-x-0 h-[2px] bg-gold rounded-full opacity-0 transition-opacity"></span>
            </a>
          </li>
          <li>
            <a
              routerLink="/services"
              routerLinkActive="text-gold"
              class="relative px-1 py-1 transition-colors hover:text-gold"
            >خدماتنا
              <span routerLinkActive="!opacity-100" class="absolute -bottom-[2px] inset-x-0 h-[2px] bg-gold rounded-full opacity-0 transition-opacity"></span>
            </a>
          </li>
          <li>
            <a
              routerLink="/about"
              routerLinkActive="text-gold"
              class="relative px-1 py-1 transition-colors hover:text-gold"
            >عن النادي
              <span routerLinkActive="!opacity-100" class="absolute -bottom-[2px] inset-x-0 h-[2px] bg-gold rounded-full opacity-0 transition-opacity"></span>
            </a>
          </li>
          <li>
            <a
              routerLink="/contact"
              routerLinkActive="text-gold"
              class="relative px-1 py-1 transition-colors hover:text-gold"
            >تواصل معنا
              <span routerLinkActive="!opacity-100" class="absolute -bottom-[2px] inset-x-0 h-[2px] bg-gold rounded-full opacity-0 transition-opacity"></span>
            </a>
          </li>
        </ul>
      </div>

      <!-- Left: CTA + Mobile menu -->
      <div class="flex items-center gap-3">
        <a
          href="https://wa.me/201069822661"
          target="_blank"
          rel="noopener"
          class="hidden sm:inline-flex items-center justify-center px-4 py-2 rounded-full bg-gradient-to-l from-gold to-gold-light text-dark font-bold text-xs shadow-md shadow-gold/20 hover:shadow-gold/30 hover:-translate-y-0.5 transition-all duration-200"
        >
          اطلب الآن
        </a>

        <!-- Mobile hamburger -->
        <button
          type="button"
          class="md:hidden inline-flex items-center justify-center w-10 h-10 rounded-xl text-gray-200 hover:text-gold hover:bg-dark-border/60 focus:outline-none focus:ring-2 focus:ring-gold/50 transition-all"
          (click)="toggleMenu()"
          aria-label="القائمة"
        >
          <svg *ngIf="!isMenuOpen" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
          </svg>
          <svg *ngIf="isMenuOpen" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- Mobile menu -->
    <div
      *ngIf="isMenuOpen"
      class="md:hidden border-t border-gold/20 bg-dark-card/95 backdrop-blur-md rounded-b-2xl shadow-xl overflow-hidden transition-all"
    >
      <ul class="flex flex-col py-2 text-sm font-semibold text-gray-200">
        <li>
          <a
            routerLink="/"
            [routerLinkActiveOptions]="{ exact: true }"
            routerLinkActive="text-gold bg-gold/5"
            class="flex items-center gap-3 px-5 py-3 hover:bg-dark-border/40 hover:text-gold border-b border-dark-border/50 transition-colors"
            (click)="toggleMenu()"
          >
            <span class="w-1.5 h-1.5 rounded-full bg-gold/40"></span>
            الرئيسية
          </a>
        </li>
        <li>
          <a
            routerLink="/services"
            routerLinkActive="text-gold bg-gold/5"
            class="flex items-center gap-3 px-5 py-3 hover:bg-dark-border/40 hover:text-gold border-b border-dark-border/50 transition-colors"
            (click)="toggleMenu()"
          >
            <span class="w-1.5 h-1.5 rounded-full bg-gold/40"></span>
            خدماتنا
          </a>
        </li>
        <li>
          <a
            routerLink="/about"
            routerLinkActive="text-gold bg-gold/5"
            class="flex items-center gap-3 px-5 py-3 hover:bg-dark-border/40 hover:text-gold border-b border-dark-border/50 transition-colors"
            (click)="toggleMenu()"
          >
            <span class="w-1.5 h-1.5 rounded-full bg-gold/40"></span>
            عن النادي
          </a>
        </li>
        <li>
          <a
            routerLink="/contact"
            routerLinkActive="text-gold bg-gold/5"
            class="flex items-center gap-3 px-5 py-3 hover:bg-dark-border/40 hover:text-gold border-b border-dark-border/50 transition-colors"
            (click)="toggleMenu()"
          >
            <span class="w-1.5 h-1.5 rounded-full bg-gold/40"></span>
            تواصل معنا
          </a>
        </li>
        <li class="px-4 pt-3 pb-4">
          <a
            href="https://wa.me/201069822661"
            target="_blank"
            rel="noopener"
            class="block w-full text-center px-5 py-2.5 rounded-full bg-gradient-to-l from-gold to-gold-light text-dark font-bold text-sm shadow-md hover:shadow-lg transition-all"
            (click)="toggleMenu()"
          >
            اطلب الآن عبر واتساب
          </a>
        </li>
      </ul>
    </div>
  </nav>
</header>
